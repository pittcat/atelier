version: "0.2.0"
notes: |
  ModemCLI 命令知识表 (Project-Level, Plan §1 R3)。
  来源: tests/fixtures/e2e_real_samples/auto_case_modem_52_loop75/modemcli_commands.md
  (由用户提供的 modemcli 测试命令说明派生; 中文文件名已按仓库规约改为 ASCII)。
  RPC 第一参数 = 功能组:
    0=Call, 1=Data, 2=Radio, 3=SIM, 4=SMS, 5=SS, 7=Misc/Tele。
commands:
  # ---- 会话入口 (Plan §1 R3: modemcli 不是业务步骤) ----
  - name: "modemcli"
    kind: "session_entry"
    business_action: "session_entry"
    description: "ModemCLI 控制台提示符; 不是业务命令"
    notes: "由 plan 锁定: 仅作为会话入口, 不归类为业务动作"

  # ---- RPC 调度入口 (业务动作由第一参数决定) ----
  - name: "debug_bes_rpc"
    kind: "rpc_dispatch"
    business_action: "rpc_dispatch"
    description: "RPC 调度命令; 实际动作取决于第一个参数 (功能组)"
    known_arg_ranges:
      - range: [0, 0]
        business_action: "call"
        description: "Call 组: dial/hangup/DTMF/call state 等"
      - range: [1, 1]
        business_action: "data_ping"
        description: "Data 组: is_active / data active / deactive"
      - range: [2, 2]
        business_action: "setting"
        description: "Radio 组: rssi/network/ims/volte/fly mode 等"
      - range: [3, 3]
        business_action: "setting"
        description: "SIM 组: status/imsi/iccid/hplmn"
      - range: [4, 4]
        business_action: "sms"
        description: "SMS 组: debug_bes_rpc 4 1 <number> <content>"
      - range: [5, 5]
        business_action: "setting"
        description: "SS 组: 呼叫转移 / 呼叫等待"
      - range: [7, 7]
        business_action: "setting"
        description: "Misc/Tele: enable modem / RNDIS / engineer mode 等"
    notes: "未覆盖的子命令保持 unknown; 不得用旧错误映射 (1≠Call, 3≠SMS)"

  # ---- 内建命令 (Plan §1 R3: !ping / !ping6 / !ifconfig) ----
  - name: "!ping"
    kind: "builtin"
    business_action: "data_ping"
    description: "IPv4 Ping"
    notes: "支持 !ping -c N host & 等扩展参数"

  - name: "!ping6"
    kind: "builtin"
    business_action: "data_ping"
    description: "IPv6 Ping"
    notes: "第一参数 = 目标 IPv6 或域名"

  - name: "!ifconfig"
    kind: "builtin"
    business_action: "setting"
    description: "网络接口设置/查询"
    notes: "查看或修改网络接口"
