cli:
  backend: claude
  autonomous_idle_timeout_secs: 900
event_loop:
  prompt_file: PROMPT.pipeline.md
  max_iterations: 30
  max_runtime_seconds: 7200
core:
  project_root: ./
  guardrails:
    - "Re-read the supplied business input and the nearest project instructions at the start of each activation."
    - "Keep changes scoped to the requested work and preserve unrelated operator changes."
    - "Never push remotes, create or switch branches/worktrees, or stop the Ralph process; the operator owns those actions."
    - "Never report completion while required verification is failing, skipped, or replaced by placeholder evidence."
    - "Verify with \"make test\" (pytest), \"make lint\" (ruff check + mypy), and \"make smoke\" (structural checks) before reporting completion."
    - "Never create cross-agent imports (from agents.<other> import ...); shared code goes through libs/common."
    - "Never register a git_push tool in any agent tools.py; all git push requires human approval."
    - "All file paths must use pathlib.Path; never hardcode / or backslash separators."
telemetry:
  runtime_diagnosis:
    enabled: true
    write_artifacts: true
    prompt_injection_enabled: true
    max_repeated_recoveries: 2
    max_prompt_findings: 8
    artifact_retention: 20
    max_prompt_chars: 4096
    retry_window_iterations: 8
_bootstrap:
  preset: "builtin:ce-executor-pipeline"
  plan: ""
  prompt_file: PROMPT.pipeline.md
  preflight: strict
